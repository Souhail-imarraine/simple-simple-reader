<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston English Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui']
                    }
                }
            }
        };
        (function applyInitialTheme() {
            let useDark = false;
            try { if (window.parent && window.parent !== window) useDark = window.parent.document.documentElement.classList.contains('dark'); } catch (e) {}
            if (!useDark) { const s = localStorage.getItem('theme-preference'); const p = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; useDark = s ? s === 'dark' : p; }
            document.documentElement.classList.toggle('dark', useDark);
        })();
        window.setTheme = function(t) { document.documentElement.classList.toggle('dark', t === 'dark'); localStorage.setItem('theme-preference', t === 'dark' ? 'dark' : 'light'); };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .vocab-item {
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            cursor: pointer;
        }
        .vocab-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -5px rgba(14,165,233,0.15);
        }
        .dark .vocab-item:hover {
            box-shadow: 0 8px 25px -5px rgba(99,102,241,0.2);
        }
        .vocab-item.active {
            border-color: #0ea5e9 !important;
            background: rgba(14,165,233,0.08);
            transform: scale(1.03);
        }
        .dark .vocab-item.active {
            border-color: #6366f1 !important;
            background: rgba(99,102,241,0.15);
        }
        .vocab-item.practiced {
            border-color: #10b981 !important;
        }
        .vocab-item.practiced .check-icon { opacity: 1; }

        @keyframes pop { 0%{transform:scale(.9)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
        .pop { animation: pop 0.3s ease; }

        .image-card {
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .image-card img {
            transition: transform 0.3s ease;
        }
        .image-card:hover img {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="h-full overflow-x-hidden">
<div class="isolate relative min-h-[100dvh] overflow-x-hidden overflow-y-auto bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50">

    <div class="pointer-events-none fixed inset-0 z-0">
        <div class="absolute -top-28 -left-28 h-80 w-80 rounded-full bg-sky-300/40 blur-3xl dark:bg-indigo-500/20"></div>
        <div class="absolute -bottom-36 -right-28 h-96 w-96 rounded-full bg-blue-300/30 blur-3xl dark:bg-purple-500/15"></div>
    </div>

    <div class="relative z-10">
        <div class="mx-auto flex min-h-[100dvh] w-full max-w-[1000px] flex-col items-center justify-center px-4 py-4 sm:px-6">

            <!-- Header -->
            <div class="slide-header mb-4 text-center opacity-0">
                <span class="inline-flex items-center gap-2 rounded-full border border-sky-400/50 bg-sky-100/60 px-5 py-2 text-[10px] font-black uppercase tracking-[0.2em] text-sky-700 dark:border-indigo-400/30 dark:bg-indigo-400/10 dark:text-indigo-300 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                    Vocabulary Practice
                </span>
                <h1 class="text-xl sm:text-2xl font-black tracking-tight">New <span class="bg-gradient-to-r from-sky-600 to-blue-600 bg-clip-text text-transparent dark:from-amber-300 dark:to-orange-400">Vocabulary</span></h1>
                <p class="mt-1 text-xs font-medium text-slate-500 dark:text-indigo-200/60">Click each word to see the image and practice pronunciation!</p>
            </div>

            <!-- Main Content -->
            <div class="main-content flex flex-col lg:flex-row items-start gap-5 w-full">

                <!-- LEFT: Vocabulary Grid -->
                <div class="vocab-section flex-1 w-full opacity-0">
                    <div class="rounded-2xl border border-sky-300/40 bg-white/70 shadow-xl backdrop-blur-sm dark:border-white/10 dark:bg-white/[0.04] overflow-hidden">
                        <div class="px-4 py-2.5 border-b border-slate-200/60 dark:border-white/5 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-sky-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-sky-700 dark:text-indigo-300">Banking Terms</span>
                            </div>
                            <span id="vocab-count" class="text-[10px] font-bold text-slate-400 dark:text-slate-500">0/13</span>
                        </div>
                        <div class="p-3 grid grid-cols-2 sm:grid-cols-3 gap-2" id="vocab-list">
                            <!-- Items injected by JS -->
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="mt-3 flex items-center gap-3">
                        <div class="flex-1 h-2 bg-slate-200 dark:bg-white/10 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-gradient-to-r from-sky-500 to-blue-500 dark:from-indigo-500 dark:to-purple-500 rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                        <span id="progress-text" class="text-xs font-black text-sky-600 dark:text-indigo-300 min-w-[36px]">0%</span>
                        <button onclick="resetPractice()" class="flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-2.5 py-1.5 text-[9px] font-extrabold uppercase tracking-wider text-slate-500 transition-all hover:border-sky-300 hover:text-sky-500 active:scale-95 dark:border-white/10 dark:bg-white/5 dark:text-slate-400">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                            Reset
                        </button>
                    </div>
                </div>

                <!-- RIGHT: Image Display -->
                <div class="image-section w-full lg:w-[320px] opacity-0">
                    <div class="image-card rounded-2xl border border-sky-300/40 bg-white/80 shadow-xl backdrop-blur-sm dark:border-white/10 dark:bg-white/[0.04] overflow-hidden">
                        <div class="px-4 py-2.5 border-b border-slate-200/60 dark:border-white/5 flex items-center gap-2">
                            <svg class="w-4 h-4 text-sky-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <span id="image-title" class="text-[10px] font-black uppercase tracking-[0.2em] text-sky-700 dark:text-indigo-300">Select a Word</span>
                        </div>
                        <div class="p-4">
                            <div id="image-container" class="relative aspect-[4/3] rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
                                <div id="placeholder" class="text-center">
                                    <svg class="w-12 h-12 mx-auto text-slate-300 dark:text-slate-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    <p class="text-xs font-medium text-slate-400 dark:text-slate-500">Click a word to see image</p>
                                </div>
                                <img id="vocab-image" src="" alt="" class="absolute inset-0 w-full h-full object-cover hidden">
                            </div>
                            <p id="current-text" class="mt-3 text-center text-sm font-bold text-slate-600 dark:text-slate-300 min-h-[24px]"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Completion message -->
            <div id="completion-msg" class="hidden mt-4 rounded-2xl bg-gradient-to-r from-emerald-500/10 to-teal-500/10 border border-emerald-500/20 p-3 text-center w-full max-w-[500px]">
                <div class="flex items-center justify-center gap-2">
                    <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span class="text-sm font-black text-emerald-600 dark:text-emerald-400">Excellent! All vocabulary practiced!</span>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function getCtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
    function playTone(f, d, t, v) {
        try {
            const c = getCtx(), o = c.createOscillator(), g = c.createGain();
            o.type = t || 'sine'; o.frequency.setValueAtTime(f, c.currentTime);
            g.gain.setValueAtTime(v || 0.12, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + d);
        } catch (e) {}
    }
    function sfxClick() { playTone(880, 0.08, 'sine', 0.08); setTimeout(() => playTone(1100, 0.06, 'sine', 0.06), 50); }
    function sfxPractice() { playTone(523, 0.1, 'sine', 0.1); setTimeout(() => playTone(659, 0.12, 'sine', 0.09), 80); }
    function sfxComplete() { playTone(523, 0.12, 'sine', 0.12); setTimeout(() => playTone(659, 0.1, 'sine', 0.1), 100); setTimeout(() => playTone(784, 0.1, 'sine', 0.09), 200); setTimeout(() => playTone(1047, 0.22, 'sine', 0.11), 300); }

    const vocabItems = [
        { word: 'Saving Account', image: 'https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?w=400&h=300&fit=crop' },
        { word: 'Current Account', image: 'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=400&h=300&fit=crop' },
        { word: 'Deposit', image: 'https://images.unsplash.com/photo-1633158829585-23ba8f7c8caf?w=400&h=300&fit=crop' },
        { word: 'Withdraw', image: 'https://images.unsplash.com/photo-1601597111158-2fceff292cdc?w=400&h=300&fit=crop' },
        { word: 'Bank Statement', image: 'https://images.unsplash.com/photo-1554224154-26032ffc0d07?w=400&h=300&fit=crop' },
        { word: 'Balance', image: 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=400&h=300&fit=crop' },
        { word: 'Sign', image: 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=400&h=300&fit=crop' },
        { word: 'Transfer', image: 'https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=400&h=300&fit=crop' },
        { word: 'Overdraw', image: 'https://images.unsplash.com/photo-1586034679970-cb7b5fc4928a?w=400&h=300&fit=crop' },
        { word: 'Bank Branch', image: 'https://images.unsplash.com/photo-1541354329998-f4d9a9f9297f?w=400&h=300&fit=crop' },
        { word: 'Transactions', image: 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=400&h=300&fit=crop' },
        { word: 'ATM', image: 'https://images.unsplash.com/photo-1589758438368-0ad531db3366?w=400&h=300&fit=crop' },
        { word: 'PIN Code', image: 'https://images.unsplash.com/photo-1563986768609-322da13575f3?w=400&h=300&fit=crop' }
    ];

    const practiced = new Set();

    function buildList() {
        const vocabList = document.getElementById('vocab-list');
        vocabList.innerHTML = vocabItems.map((item, i) => `
            <div class="vocab-item flex flex-col items-center justify-center gap-1.5 px-2 py-3 rounded-xl border-2 border-sky-200/60 bg-white/50 dark:border-white/10 dark:bg-white/[0.03] text-center" data-idx="${i}" onclick="practiceItem(${i})">
                <span class="text-[10px] font-black text-slate-700 dark:text-slate-200 uppercase tracking-wide leading-tight">${item.word}</span>
                <svg class="check-icon w-3.5 h-3.5 text-emerald-500 opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            </div>
        `).join('');
    }

    function practiceItem(idx) {
        sfxPractice();

        document.querySelectorAll('.vocab-item').forEach(el => el.classList.remove('active'));

        const items = document.querySelectorAll('.vocab-item');
        const item = items[idx];
        item.classList.add('active', 'pop');

        practiced.add(idx);
        item.classList.add('practiced');

        const vocab = vocabItems[idx];
        
        // Update image
        const imgEl = document.getElementById('vocab-image');
        const placeholder = document.getElementById('placeholder');
        const imageTitle = document.getElementById('image-title');
        const currentText = document.getElementById('current-text');

        imageTitle.textContent = vocab.word;
        currentText.textContent = vocab.word;

        // Animate image change
        gsap.to(imgEl, { opacity: 0, scale: 0.95, duration: 0.15, onComplete: () => {
            imgEl.src = vocab.image;
            imgEl.alt = vocab.word;
            imgEl.classList.remove('hidden');
            placeholder.classList.add('hidden');
            gsap.to(imgEl, { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out(1.2)' });
        }});

        gsap.from(currentText, { opacity: 0, y: 10, duration: 0.3 });

        speakText(vocab.word);
        updateProgress();

        setTimeout(() => item.classList.remove('pop'), 300);
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 0.85;
            utter.pitch = 1;
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Google') || v.name.includes('Samantha') || v.name.includes('Daniel')));
            if (preferred) utter.voice = preferred;
            window.speechSynthesis.speak(utter);
        }
    }

    function updateProgress() {
        const done = practiced.size;
        const total = vocabItems.length;
        const pct = Math.round((done / total) * 100);

        document.getElementById('vocab-count').textContent = `${done}/${total}`;
        document.getElementById('progress-text').textContent = `${pct}%`;
        document.getElementById('progress-bar').style.width = `${pct}%`;

        if (done === total) {
            sfxComplete();
            document.getElementById('completion-msg').classList.remove('hidden');
            gsap.from('#completion-msg', { opacity: 0, y: 20, duration: 0.5, ease: 'back.out(1.5)' });
        }
    }

    function resetPractice() {
        sfxClick();
        practiced.clear();

        document.querySelectorAll('.vocab-item').forEach(el => {
            el.classList.remove('active', 'practiced');
        });

        document.getElementById('completion-msg').classList.add('hidden');
        document.getElementById('current-text').textContent = '';
        document.getElementById('image-title').textContent = 'Select a Word';
        document.getElementById('vocab-image').classList.add('hidden');
        document.getElementById('placeholder').classList.remove('hidden');
        updateProgress();
    }

    document.addEventListener('DOMContentLoaded', () => {
        buildList();

        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        if (!window.gsap) {
            document.querySelectorAll('.slide-header, .vocab-section, .image-section').forEach(el => el.style.opacity = '1');
            return;
        }

        gsap.set(['.slide-header', '.vocab-section', '.image-section'], { opacity: 0, y: 20 });
        const tl = gsap.timeline({ defaults: { ease: 'power4.out' } });
        tl.to('.slide-header', { opacity: 1, y: 0, duration: 0.5 })
          .to('.vocab-section', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
          .to('.image-section', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3');

        setTimeout(() => {
            document.querySelectorAll('.vocab-item').forEach((el, i) => {
                gsap.set(el, { opacity: 0, scale: 0.8 });
                gsap.to(el, { opacity: 1, scale: 1, duration: 0.3, delay: i * 0.04, ease: 'back.out(1.5)' });
            });
        }, 300);

        window.resetSlide = () => {
            resetPractice();
            gsap.set(['.slide-header', '.vocab-section', '.image-section'], { clearProps: 'all', opacity: 0, y: 20 });
            tl.restart();
        };
    });

    window.stopSlideAudio = function () {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    };
</script>
</body>
</html>
