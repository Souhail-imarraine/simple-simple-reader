<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston English Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui']
                    }
                }
            }
        };
        (function applyInitialTheme() {
            let useDark = false;
            try { if (window.parent && window.parent !== window) useDark = window.parent.document.documentElement.classList.contains('dark'); } catch (e) {}
            if (!useDark) { const s = localStorage.getItem('theme-preference'); const p = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; useDark = s ? s === 'dark' : p; }
            document.documentElement.classList.toggle('dark', useDark);
        })();
        window.setTheme = function(t) { document.documentElement.classList.toggle('dark', t === 'dark'); localStorage.setItem('theme-preference', t === 'dark' ? 'dark' : 'light'); };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .lang-item {
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            cursor: pointer;
        }
        .lang-item:hover {
            transform: translateX(6px);
            background: rgba(99,102,241,0.08);
        }
        .dark .lang-item:hover {
            background: rgba(99,102,241,0.15);
        }
        .lang-item.active {
            background: rgba(99,102,241,0.12);
            border-left-color: #6366f1 !important;
            transform: scale(1.02);
        }
        .dark .lang-item.active {
            background: rgba(99,102,241,0.2);
        }
        .lang-item.practiced {
            border-left-color: #10b981 !important;
        }
        .lang-item.practiced .check-icon { opacity: 1; }

        @keyframes pop { 0%{transform:scale(.9)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
        .pop { animation: pop 0.3s ease; }

        .mic-icon { transition: all 0.4s ease; }

        .progress-ring { transition: stroke-dashoffset 0.5s ease; }
    </style>
</head>
<body class="h-full overflow-x-hidden">
<div class="isolate relative min-h-[100dvh] overflow-x-hidden overflow-y-auto bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50">

    <div class="pointer-events-none fixed inset-0 z-0">
        <div class="absolute -top-28 -left-28 h-80 w-80 rounded-full bg-sky-300/40 blur-3xl dark:bg-indigo-500/20"></div>
        <div class="absolute -bottom-36 -right-28 h-96 w-96 rounded-full bg-blue-300/30 blur-3xl dark:bg-purple-500/15"></div>
    </div>

    <div class="relative z-10">
        <div class="mx-auto flex min-h-[100dvh] w-full max-w-[900px] flex-col items-center justify-center px-4 py-5 sm:px-6">

            <!-- Header -->
            <div class="slide-header mb-6 text-center opacity-0">
                <span class="inline-flex items-center gap-2 rounded-full border border-purple-400/50 bg-purple-100/60 px-5 py-2 text-[10px] font-black uppercase tracking-[0.2em] text-purple-700 dark:border-purple-400/30 dark:bg-purple-400/10 dark:text-purple-300 mb-3">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    Language Practice
                </span>
                <h1 class="text-2xl sm:text-3xl font-black tracking-tight">New <span class="bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent dark:from-amber-300 dark:to-orange-400">Language</span></h1>
                <p class="mt-2 text-sm font-medium text-slate-500 dark:text-indigo-200/60">Click each phrase to practice reading. Listen and repeat!</p>
            </div>

            <!-- Main Content -->
            <div class="main-content flex flex-col lg:flex-row items-center gap-8 w-full max-w-[800px]">

                <!-- LEFT: Language List -->
                <div class="lang-section flex-1 w-full opacity-0">
                    <div class="rounded-2xl border border-purple-300/40 bg-white/70 shadow-xl backdrop-blur-sm dark:border-white/10 dark:bg-white/[0.04] overflow-hidden">
                        <div class="px-4 py-3 border-b border-slate-200/60 dark:border-white/5 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-purple-700 dark:text-purple-300">Useful Phrases</span>
                            </div>
                            <span id="lang-count" class="text-[10px] font-bold text-slate-400 dark:text-slate-500">0/5</span>
                        </div>
                        <div class="p-3 space-y-2" id="lang-list">
                            <!-- Items injected by JS -->
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="mt-4 flex items-center gap-3">
                        <div class="flex-1 h-2 bg-slate-200 dark:bg-white/10 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-gradient-to-r from-purple-500 to-indigo-500 rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                        <span id="progress-text" class="text-xs font-black text-purple-600 dark:text-purple-300 min-w-[36px]">0%</span>
                    </div>
                </div>

                <!-- RIGHT: Microphone Visual -->
                <div class="mic-section flex flex-col items-center opacity-0">
                    <div class="mic-icon relative" id="mic-visual">
                        <svg class="w-32 h-44" viewBox="0 0 100 150" fill="none">
                            <rect x="25" y="10" width="50" height="80" rx="25" class="fill-slate-200 dark:fill-slate-700 stroke-slate-400 dark:stroke-slate-500" stroke-width="3"/>
                            <rect x="35" y="20" width="30" height="50" rx="15" class="fill-purple-100 dark:fill-purple-900/50 stroke-purple-300 dark:stroke-purple-500" stroke-width="2"/>
                            <path d="M50 90 L50 120" class="stroke-slate-400 dark:stroke-slate-500" stroke-width="4" stroke-linecap="round"/>
                            <ellipse cx="50" cy="130" rx="25" ry="8" class="fill-slate-300 dark:fill-slate-600"/>
                        </svg>
                        <div id="speaking-indicator" class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-purple-500/30 opacity-0"></div>
                    </div>
                    <p id="current-text" class="mt-3 text-center text-sm font-bold text-slate-500 dark:text-slate-400 max-w-[180px] min-h-[40px]">Click a phrase to practice</p>
                    <button onclick="resetPractice()" class="mt-4 flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-4 py-2 text-[10px] font-extrabold uppercase tracking-wider text-slate-500 transition-all hover:border-purple-300 hover:text-purple-500 active:scale-95 dark:border-white/10 dark:bg-white/5 dark:text-slate-400">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        Reset
                    </button>
                </div>
            </div>

            <!-- Completion message -->
            <div id="completion-msg" class="hidden mt-6 rounded-2xl bg-gradient-to-r from-emerald-500/10 to-teal-500/10 border border-emerald-500/20 p-4 text-center w-full max-w-[500px]">
                <div class="flex items-center justify-center gap-2 mb-1">
                    <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span class="text-sm font-black text-emerald-600 dark:text-emerald-400">Great job! All phrases practiced!</span>
                </div>
                <p class="text-xs font-medium text-emerald-600/70 dark:text-emerald-400/60">Continue to the next slide for vocabulary practice.</p>
            </div>

        </div>
    </div>
</div>

<script>
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function getCtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
    function playTone(f, d, t, v) {
        try {
            const c = getCtx(), o = c.createOscillator(), g = c.createGain();
            o.type = t || 'sine'; o.frequency.setValueAtTime(f, c.currentTime);
            g.gain.setValueAtTime(v || 0.12, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + d);
        } catch (e) {}
    }
    function sfxClick() { playTone(880, 0.08, 'sine', 0.08); setTimeout(() => playTone(1100, 0.06, 'sine', 0.06), 50); }
    function sfxPractice() { playTone(523, 0.1, 'sine', 0.1); setTimeout(() => playTone(659, 0.12, 'sine', 0.09), 80); }
    function sfxComplete() { playTone(523, 0.12, 'sine', 0.12); setTimeout(() => playTone(659, 0.1, 'sine', 0.1), 100); setTimeout(() => playTone(784, 0.1, 'sine', 0.09), 200); setTimeout(() => playTone(1047, 0.22, 'sine', 0.11), 300); }

    const langItems = [
        { display: 'Your total is…', audio: 'Your total is' },
        { display: 'Pay by card <span class="text-purple-500 dark:text-purple-300 font-normal">/ cash / check</span>', audio: 'Pay by card' },
        { display: 'Insert your card', audio: 'Insert your card' },
        { display: "Here's your receipt.", audio: "Here's your receipt" },
        { display: 'I would like to open a bank account', audio: 'I would like to open a bank account' }
    ];

    const practiced = new Set();

    function buildList() {
        const langList = document.getElementById('lang-list');
        langList.innerHTML = langItems.map((item, i) => `
            <div class="lang-item flex items-center gap-3 px-4 py-3.5 rounded-xl border-l-[3px] border-transparent" data-idx="${i}" onclick="practiceItem(${i})">
                <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-xl bg-purple-500/15 text-xs font-black text-purple-600 dark:bg-purple-400/15 dark:text-purple-300">${i + 1}</span>
                <p class="flex-1 text-sm font-bold text-slate-700 dark:text-slate-200">${item.display}</p>
                <svg class="check-icon w-5 h-5 text-emerald-500 opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            </div>
        `).join('');
    }

    function practiceItem(idx) {
        sfxPractice();

        document.querySelectorAll('.lang-item').forEach(el => el.classList.remove('active'));

        const items = document.querySelectorAll('.lang-item');
        const item = items[idx];
        item.classList.add('active', 'pop');

        practiced.add(idx);
        item.classList.add('practiced');

        const audioText = langItems[idx].audio;
        const currentText = document.getElementById('current-text');
        if (currentText) {
            currentText.textContent = audioText;
            gsap.from(currentText, { opacity: 0, y: 10, duration: 0.3 });
        }

        const indicator = document.getElementById('speaking-indicator');
        if (indicator) {
            gsap.to(indicator, { opacity: 1, scale: 1.5, duration: 0.3, yoyo: true, repeat: 3 });
        }

        speakText(audioText);
        updateProgress();

        setTimeout(() => item.classList.remove('pop'), 300);
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 0.9;
            utter.pitch = 1;
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Google') || v.name.includes('Samantha') || v.name.includes('Daniel')));
            if (preferred) utter.voice = preferred;
            window.speechSynthesis.speak(utter);
        }
    }

    function updateProgress() {
        const done = practiced.size;
        const total = langItems.length;
        const pct = Math.round((done / total) * 100);

        document.getElementById('lang-count').textContent = `${done}/${total}`;
        document.getElementById('progress-text').textContent = `${pct}%`;
        document.getElementById('progress-bar').style.width = `${pct}%`;

        if (done === total) {
            sfxComplete();
            document.getElementById('completion-msg').classList.remove('hidden');
            gsap.from('#completion-msg', { opacity: 0, y: 20, duration: 0.5, ease: 'back.out(1.5)' });
        }
    }

    function resetPractice() {
        sfxClick();
        practiced.clear();

        document.querySelectorAll('.lang-item').forEach(el => {
            el.classList.remove('active', 'practiced');
        });

        document.getElementById('completion-msg').classList.add('hidden');
        document.getElementById('current-text').textContent = 'Click a phrase to practice';
        updateProgress();
    }

    document.addEventListener('DOMContentLoaded', () => {
        buildList();

        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        if (!window.gsap) {
            document.querySelectorAll('.slide-header, .lang-section, .mic-section').forEach(el => el.style.opacity = '1');
            return;
        }

        gsap.set(['.slide-header', '.lang-section', '.mic-section'], { opacity: 0, y: 20 });
        const tl = gsap.timeline({ defaults: { ease: 'power4.out' } });
        tl.to('.slide-header', { opacity: 1, y: 0, duration: 0.5 })
          .to('.lang-section', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
          .to('.mic-section', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3');

        setTimeout(() => {
            document.querySelectorAll('.lang-item').forEach((el, i) => {
                gsap.set(el, { opacity: 0, x: -15 });
                gsap.to(el, { opacity: 1, x: 0, duration: 0.35, delay: i * 0.08, ease: 'power4.out' });
            });
        }, 300);

        window.resetSlide = () => {
            resetPractice();
            gsap.set(['.slide-header', '.lang-section', '.mic-section'], { clearProps: 'all', opacity: 0, y: 20 });
            tl.restart();
        };
    });

    window.stopSlideAudio = function () {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    };
</script>
</body>
</html>
